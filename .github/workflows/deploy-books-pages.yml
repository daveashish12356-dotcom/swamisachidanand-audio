# Deploy public/books and public/thumbnails so all 60 PDFs are online.
# Repo Settings > Pages > Source: "Deploy from a branch" > Branch: gh-pages > / (root)
name: Deploy books and thumbnails to Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy books, thumbnails, book list and suvichar to site root
        run: |
          mkdir -p _site
          cp -r public/books _site/
          cp -r public/thumbnails _site/
          if [ -f public/books_server_list.json ]; then
            cat public/books_server_list.json > _site/books_server_list.json
          else
            echo "FATAL: public/books_server_list.json not found"; ls -la public/; exit 1
          fi
          count=$(grep -o '\.pdf"' _site/books_server_list.json | wc -l)
          echo "Book count in list: $count"
          if [ "$count" -lt 60 ]; then echo "ERROR: expected 60 books, got $count"; exit 1; fi
          cp public/suvichar_config.json _site/ 2>/dev/null || true
          cp public/suvichar_control.html _site/ 2>/dev/null || true
          echo "60 books + thumbnails" > _site/index.html
          ls -la _site/
          head -c 200 _site/books_server_list.json

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          force_orphan: true
